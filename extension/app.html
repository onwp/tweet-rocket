<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TweetRocket</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
        <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
        <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
        <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
      </svg>
      TweetRocket
    </div>
    <div style="display:flex;align-items:center;gap:4px;">
      <button class="settings-btn" id="historyBtn" title="History">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
          <path d="M12 7v5l4 2"/>
        </svg>
      </button>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-mode="write">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>
      Write
    </button>
    <button class="tab" data-mode="rewrite">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      Rewrite
    </button>
    <button class="tab" data-mode="reply">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
      Reply
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Editor -->
    <div class="editor">
      <textarea id="input" placeholder="Enter your topic or idea..."></textarea>
      <div class="editor-footer">
        <div class="tone-wrap" id="toneWrap">
          <button class="tone-btn" id="toneBtn">
            Tone: <span id="toneLabel">Engaging</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <div class="tone-menu hidden" id="toneMenu"></div>
        </div>
        <span class="char-count" id="charCount" style="color:#71717a">0/280</span>
      </div>
    </div>

    <!-- Generate Button -->
    <button class="generate-btn" id="generateBtn" disabled>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/>
        <path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/>
        <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/>
        <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/>
      </svg>
      <span id="generateLabel">Generate Viral Tweets</span>
      <span class="shortcut" id="shortcutHint"></span>
    </button>

    <!-- Error -->
    <div class="error-box hidden" id="errorBox">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <p id="errorText"></p>
    </div>

    <!-- Results -->
    <div id="results"></div>

    <!-- Score Panel -->
    <div class="score-panel" id="scorePanel">
      <div class="score-title">Algorithm Score</div>
      <div class="score-ring-wrap">
        <div class="score-ring" id="scoreRing"></div>
      </div>
      <div class="score-bars" id="scoreBars"></div>
      <div class="tips-section hidden" id="tipsSection">
        <div class="tips-header">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
          Tips
        </div>
        <div id="tipsList"></div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="settings-overlay hidden" id="settingsModal">
    <div class="settings-backdrop" id="settingsBackdrop"></div>
    <div class="settings-panel">
      <div class="settings-head">
        <h3>Settings</h3>
        <button class="close-btn" id="settingsClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div>
        <label class="field-label">Anthropic API Key</label>
        <input type="password" class="text-input" id="apiKeyInput" placeholder="sk-ant-...">
        <p class="field-hint">Your key is stored locally and never sent anywhere except Anthropic's API. Get a key at <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></p>
      </div>
      <div class="mode-section">
        <label class="field-label">Extension Mode</label>
        <div class="mode-toggle" id="modeToggle">
          <button class="mode-option active" data-mode="popup">Popup</button>
          <button class="mode-option" data-mode="sidebar">Sidebar</button>
        </div>
        <p class="field-hint" style="margin-top:6px">Popup opens on click. Sidebar pins to the right side of your browser.</p>
      </div>
      <div class="settings-actions">
        <button class="btn-secondary" id="settingsCancel">Cancel</button>
        <button class="btn-primary" id="settingsSave">Save</button>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div class="settings-overlay hidden" id="historyModal">
    <div class="settings-backdrop" id="historyBackdrop"></div>
    <div class="settings-panel" style="max-width:400px;max-height:80vh;overflow-y:auto;">
      <div class="settings-head">
        <h3>History</h3>
        <button class="close-btn" id="historyClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div id="historyList" style="font-size:12px;"></div>
      <button class="btn-secondary" id="clearHistory" style="margin-top:12px;width:100%;color:var(--danger);">Clear History</button>
    </div>
  </div>

  <script src="algorithm.js"></script>
  <script src="app.js"></script>
</body>
</html>
